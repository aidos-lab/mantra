name: Run tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.10.11'

      - name: Install dependencies
        run: uv sync

      # We drive coverage through `coverage run -m pytest` rather than the
      # pytest-cov plugin: starting pytest-cov before torch is imported
      # trips a torch/coverage bug ("function '_has_torch_function' already
      # has a docstring"). Plain `coverage run` avoids it.
      - name: Run tests with coverage
        run: |
          uv run coverage run -m pytest
          uv run coverage report
